services:
  - type: web
    name: sincere-backend
    env: php
    plan: free
    buildCommand: "composer install --optimize-autoloader --no-dev"
    startCommand: "php -S 0.0.0.0:$PORT -t public"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false